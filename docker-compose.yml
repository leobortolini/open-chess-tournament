services:
  postgres:
    image: postgres:16-alpine
    container_name: chess-tournament-db
    environment:
      POSTGRES_DB: chess_tournament
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_tournament"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
